<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeFlix - Movie Search</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0f0f0f;
        color: #fff;
        font-family: "Segoe UI", Arial, sans-serif;
        min-height: 100vh;
      }

      header {
        background: #141414;
        padding: 1.2rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 2px solid #e50914;
        gap: 1rem;
        flex-wrap: wrap;
      }

      header h1 {
        color: #e50914;
        font-size: 1.8rem;
        letter-spacing: 2px;
        font-weight: 800;
      }

      .search-bar {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      .search-bar input {
        padding: 0.55rem 1rem;
        border-radius: 6px;
        border: none;
        background: #2a2a2a;
        color: #fff;
        font-size: 1rem;
        width: 260px;
        outline: none;
      }

      .search-bar input::placeholder {
        color: #888;
      }

      .search-bar button {
        padding: 0.55rem 1.2rem;
        background: #e50914;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        transition: background 0.2s;
        font-weight: 700;
      }

      .search-bar button:hover {
        background: #b0060f;
      }

      main {
        padding: 2rem;
      }

      #status {
        text-align: center;
        color: #888;
        font-size: 1rem;
        margin-bottom: 1.5rem;
      }

      #results {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 1.5rem;
      }

      .movie-card {
        background: #1a1a1a;
        border-radius: 10px;
        overflow: hidden;
        transition:
          transform 0.18s,
          box-shadow 0.18s;
        cursor: default;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      .movie-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 10px 30px rgba(229, 9, 20, 0.25);
      }

      .movie-card img {
        width: 100%;
        display: block;
        aspect-ratio: 2 / 3;
        object-fit: cover;
        background: #2a2a2a;
      }

      .movie-info {
        padding: 0.7rem 0.85rem 0.95rem;
      }

      .movie-title {
        font-size: 0.92rem;
        font-weight: 650;
        margin-bottom: 0.35rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.2;
      }

      .movie-rating {
        font-size: 0.85rem;
        color: #f5c518;
        display: flex;
        align-items: baseline;
        gap: 6px;
      }

      .movie-rating span {
        color: #aaa;
        font-size: 0.78rem;
      }

      .muted {
        color: #888;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>VibeFlix</h1>
      <div class="search-bar">
        <input
          id="searchInput"
          type="text"
          placeholder="Search for movies..."
        />
        <button id="searchBtn" type="button">Search</button>
      </div>
    </header>

    <main>
      <p id="status">Search for your favourite movies above.</p>
      <div id="results"></div>
    </main>

    <script>
      // NOTE: Putting a TMDb API key in frontend JS exposes it publicly.
      // For production, proxy requests through your backend or use TMDb's recommended auth flow.
      const API_KEY = "aa2cbaf25fa675ca83cf1262915dd3fc";

      const BASE_URL = "https://api.themoviedb.org/3";
      const IMG_URL = "https://image.tmdb.org/t/p/w342";
      const PLACEHOLDER =
        "https://via.placeholder.com/342x513/1a1a1a/888?text=No+Poster";

      const searchInput = document.getElementById("searchInput");
      const searchBtn = document.getElementById("searchBtn");
      const resultsEl = document.getElementById("results");
      const statusEl = document.getElementById("status");

      async function searchMovies(query) {
        const url =
          `${BASE_URL}/search/movie?api_key=${encodeURIComponent(API_KEY)}` +
          `&query=${encodeURIComponent(query)}`;

        const res = await fetch(url);
        if (!res.ok) {
          // Try to read any error message TMDb returns
          let msg = `Request failed (${res.status})`;
          try {
            const errData = await res.json();
            if (errData && errData.status_message) msg = errData.status_message;
          } catch (_) {}
          throw new Error(msg);
        }

        const data = await res.json();
        return data.results || [];
      }

      function renderMovies(movies) {
        resultsEl.innerHTML = "";

        if (!movies.length) {
          statusEl.textContent = "No movies found. Try a different search.";
          return;
        }

        statusEl.textContent = `${movies.length} result(s) found.`;

        for (const movie of movies) {
          const { title, poster_path, vote_average } = movie;

          const card = document.createElement("div");
          card.className = "movie-card";

          const rating =
            typeof vote_average === "number" ? vote_average.toFixed(1) : "N/A";

          card.innerHTML = `
          <img
            src="${poster_path ? IMG_URL + poster_path : PLACEHOLDER}"
            alt="${title || "Movie"}"
            loading="lazy"
          />
          <div class="movie-info">
            <div class="movie-title" title="${title || ""}">${title || "Untitled"}</div>
            <div class="movie-rating">
              ★ ${rating} <span>/ 10</span>
            </div>
          </div>
        `;

          resultsEl.appendChild(card);
        }
      }

      async function handleSearch() {
        const query = searchInput.value.trim();
        if (!query) return;

        statusEl.textContent = "Loading...";
        resultsEl.innerHTML = "";

        try {
          const movies = await searchMovies(query);
          renderMovies(movies);
        } catch (err) {
          console.error(err);
          statusEl.textContent = "Something went wrong. Kindly wait.";
        }
      }

      searchBtn.addEventListener("click", handleSearch);
      searchInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleSearch();
      });
    </script>
  </body>
</html>
