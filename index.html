<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeFlix - Movie Search</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0f0f0f;
        color: #fff;
        font-family: "Segoe UI", Arial, sans-serif;
        min-height: 100vh;
      }

      header {
        background: #141414;
        padding: 1.2rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 2px solid #e50914;
        gap: 1rem;
        flex-wrap: wrap;
      }

      header h1 {
        color: #e50914;
        font-size: 1.8rem;
        letter-spacing: 2px;
        font-weight: 800;
      }

      .search-bar {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      .search-bar input {
        padding: 0.55rem 1rem;
        border-radius: 6px;
        border: none;
        background: #2a2a2a;
        color: #fff;
        font-size: 1rem;
        width: 260px;
        outline: none;
        transition: background 0.2s ease;
      }

      .search-bar input:focus {
        background: #3a3a3a;
      }

      .search-bar input::placeholder {
        color: #888;
      }

      .search-bar button {
        padding: 0.55rem 1.2rem;
        background: #e50914;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        transition:
          background 0.2s,
          transform 0.15s;
        font-weight: 700;
      }

      .search-bar button:hover {
        background: #b0060f;
        transform: scale(1.02);
      }

      .search-bar button:active {
        transform: scale(0.98);
      }

      main {
        padding: 2rem;
      }

      #status {
        text-align: center;
        color: #888;
        font-size: 1rem;
        margin-bottom: 1.5rem;
        min-height: 1.5rem;
      }

      .section-title {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 1rem;
        color: #e50914;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* Loading Spinner Styles */
      .spinner-container {
        display: none;
        justify-content: center;
        align-items: center;
        min-height: 200px;
      }

      .spinner-container.active {
        display: flex;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(229, 9, 20, 0.2);
        border-top: 4px solid #e50914;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .spinner-text {
        margin-left: 1rem;
        color: #e50914;
        font-weight: 600;
        font-size: 1rem;
      }

      #results {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 1.5rem;
      }

      .movie-card {
        background: #1a1a1a;
        border-radius: 10px;
        overflow: hidden;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
        cursor: default;
        border: 1px solid rgba(255, 255, 255, 0.04);
        opacity: 1;
        animation: fadeInUp 0.6s ease forwards;
      }

      /* Stagger animation for each card */
      .movie-card:nth-child(1) {
        animation-delay: 0.05s;
      }
      .movie-card:nth-child(2) {
        animation-delay: 0.1s;
      }
      .movie-card:nth-child(3) {
        animation-delay: 0.15s;
      }
      .movie-card:nth-child(4) {
        animation-delay: 0.2s;
      }
      .movie-card:nth-child(5) {
        animation-delay: 0.25s;
      }
      .movie-card:nth-child(6) {
        animation-delay: 0.3s;
      }
      .movie-card:nth-child(7) {
        animation-delay: 0.35s;
      }
      .movie-card:nth-child(8) {
        animation-delay: 0.4s;
      }
      .movie-card:nth-child(9) {
        animation-delay: 0.45s;
      }
      .movie-card:nth-child(10) {
        animation-delay: 0.5s;
      }
      .movie-card:nth-child(n + 11) {
        animation-delay: 0.55s;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .movie-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 10px 30px rgba(229, 9, 20, 0.25);
      }

      .movie-card img {
        width: 100%;
        display: block;
        aspect-ratio: 2 / 3;
        object-fit: cover;
        background: #2a2a2a;
        transition:
          transform 0.3s ease,
          filter 0.3s ease;
      }

      .movie-card:hover img {
        transform: scale(1.05);
        filter: brightness(1.1);
      }

      .movie-info {
        padding: 0.7rem 0.85rem 0.95rem;
      }

      .movie-title {
        font-size: 0.92rem;
        font-weight: 650;
        margin-bottom: 0.35rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.2;
      }

      .movie-rating {
        font-size: 0.85rem;
        color: #f5c518;
        display: flex;
        align-items: baseline;
        gap: 6px;
      }

      .movie-rating span {
        color: #aaa;
        font-size: 0.78rem;
      }

      .muted {
        color: #888;
      }

      /* Responsive adjustments */
      @media (max-width: 768px) {
        header {
          flex-direction: column;
          align-items: stretch;
        }

        .search-bar {
          width: 100%;
        }

        .search-bar input {
          flex: 1;
          width: auto;
        }

        #results {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          gap: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>VibeFlix</h1>
      <div class="search-bar">
        <input
          id="searchInput"
          type="text"
          placeholder="Search for movies..."
        />
        <button id="searchBtn" type="button">Search</button>
      </div>
    </header>

    <main>
      <p id="status">Featured movies</p>

      <div id="spinnerContainer" class="spinner-container">
        <div class="spinner"></div>
        <span class="spinner-text">Loading movies...</span>
      </div>

      <div id="results"></div>
    </main>

    <script>
      // NOTE: Putting a TMDb API key in frontend JS exposes it publicly.
      // For production, proxy requests through your backend or use TMDb's recommended auth flow.
      const API_KEY = "aa2cbaf25fa675ca83cf1262915dd3fc";

      const BASE_URL = "https://api.themoviedb.org/3";
      const IMG_URL = "https://image.tmdb.org/t/p/w342";
      const PLACEHOLDER =
        "https://via.placeholder.com/342x513/1a1a1a/888?text=No+Poster";

      // Default featured movies template data
      const DEFAULT_MOVIES = [
        {
          id: 1,
          title: "Inception",
          poster_path: "/9gk7adHYeDMPS6QcYLzAGvwhJ5J.jpg",
          vote_average: 8.8,
        },
        {
          id: 2,
          title: "The Dark Knight",
          poster_path: "/1hqwGsOCSfepDMXVqC19UO1nK2n.jpg",
          vote_average: 9.0,
        },
        {
          id: 3,
          title: "Interstellar",
          poster_path: "/gEU2QniE6E77NI6lCu244UZsbGa.jpg",
          vote_average: 8.6,
        },
        {
          id: 4,
          title: "Pulp Fiction",
          poster_path: "/dM2w364MScsjFjitE5sYGaP40gn.jpg",
          vote_average: 8.9,
        },
        {
          id: 5,
          title: "Forrest Gump",
          poster_path: "/clnqb4fck6DNDc0r8zf8Jw7Qvsd.jpg",
          vote_average: 8.8,
        },
        {
          id: 6,
          title: "The Matrix",
          poster_path: "/lJwSvq305C2p5PVkjLmeshow5Ac.jpg",
          vote_average: 8.7,
        },
        {
          id: 7,
          title: "Gladiator",
          poster_path: "/x2RS0WyE4csWytkJ0l0r5HNsaAh.jpg",
          vote_average: 8.5,
        },
        {
          id: 8,
          title: "The Shawshank Redemption",
          poster_path: "/q6y0aVAvQSpjlEJsBl9SPZKTYa5.jpg",
          vote_average: 9.3,
        },
        {
          id: 9,
          title: "Avatar",
          poster_path: "/jRXYjXNq0Cs2qQAGnTPuZpg9CAa.jpg",
          vote_average: 7.8,
        },
        {
          id: 10,
          title: "The Avengers",
          poster_path: "/RYMX2ub5dvw9aPyc9QXax0Xw0Ph.jpg",
          vote_average: 8.0,
        },
        {
          id: 11,
          title: "Oppenheimer",
          poster_path: "/8Gxv8gSFCU0XGDykEGClnunen5b.jpg",
          vote_average: 8.1,
        },
        {
          id: 12,
          title: "Dune",
          poster_path: "/lJwSvq305C2p5PVkjLmeshow5Ac.jpg",
          vote_average: 7.9,
        },
      ];

      const searchInput = document.getElementById("searchInput");
      const searchBtn = document.getElementById("searchBtn");
      const resultsEl = document.getElementById("results");
      const statusEl = document.getElementById("status");
      const spinnerContainer = document.getElementById("spinnerContainer");

      async function searchMovies(query) {
        const url =
          `${BASE_URL}/search/movie?api_key=${encodeURIComponent(API_KEY)}` +
          `&query=${encodeURIComponent(query)}`;

        const res = await fetch(url);
        if (!res.ok) {
          // Try to read any error message TMDb returns
          let msg = `Request failed (${res.status})`;
          try {
            const errData = await res.json();
            if (errData && errData.status_message) msg = errData.status_message;
          } catch (_) {}
          throw new Error(msg);
        }

        const data = await res.json();
        return data.results || [];
      }

      function renderMovies(movies, isSearch = false) {
        resultsEl.innerHTML = "";

        if (!movies.length) {
          statusEl.textContent = "No movies found. Try a different search.";
          spinnerContainer.classList.remove("active");
          return;
        }

        if (isSearch) {
          statusEl.textContent = `${movies.length} result(s) found.`;
        } else {
          statusEl.textContent = "Featured movies";
        }

        for (const movie of movies) {
          const { title, poster_path, vote_average } = movie;

          const card = document.createElement("div");
          card.className = "movie-card";
          card.id = `movie-card-${movie.id}`;

          const rating =
            typeof vote_average === "number" ? vote_average.toFixed(1) : "N/A";

          card.innerHTML = `
          <img
            src="${poster_path ? IMG_URL + poster_path : PLACEHOLDER}"
            alt="${title || "Movie"}"
            loading="lazy"
            onerror="this.src='${PLACEHOLDER}'"
          />
          <div class="movie-info">
            <div class="movie-title" title="${title || ""}">${title || "Untitled"}</div>
            <div class="movie-rating">
              ★ ${rating} <span>/ 10</span>
            </div>
          </div>
        `;

          resultsEl.appendChild(card);
        }

        spinnerContainer.classList.remove("active");
      }

      async function handleSearch() {
        const query = searchInput.value.trim();
        if (!query) return;

        statusEl.textContent = "";
        resultsEl.innerHTML = "";
        spinnerContainer.classList.add("active");

        try {
          const movies = await searchMovies(query);
          renderMovies(movies, true);
        } catch (err) {
          console.error(err);
          statusEl.textContent =
            "Something went wrong. Check your API key or connection.";
          spinnerContainer.classList.remove("active");
        }
      }

      // Event listeners
      searchBtn.addEventListener("click", handleSearch);
      searchInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleSearch();
      });

      // Render default featured movies immediately
      renderMovies(DEFAULT_MOVIES, false);
    </script>
  </body>
</html>
