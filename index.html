<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeFlix - Movie Search</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #0f0f0f;
        color: #ffffff;
        font-family: "Segoe UI", sans-serif;
        min-height: 100vh;
      }

      header {
        background-color: #141414;
        padding: 1.2rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 2px solid #e50914;
      }

      header h1 {
        color: #e50914;
        font-size: 1.8rem;
        letter-spacing: 2px;
      }

      .search-bar {
        display: flex;
        gap: 0.5rem;
      }

      .search-bar input {
        padding: 0.5rem 1rem;
        border-radius: 4px;
        border: none;
        background: #2a2a2a;
        color: #fff;
        font-size: 1rem;
        width: 260px;
        outline: none;
      }

      .search-bar input::placeholder {
        color: #888;
      }

      .search-bar button {
        padding: 0.5rem 1.2rem;
        background: #e50914;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        transition: background 0.2s;
      }

      .search-bar button:hover {
        background: #b0060f;
      }

      main {
        padding: 2rem;
      }

      #status {
        text-align: center;
        color: #888;
        font-size: 1rem;
        margin-bottom: 1.5rem;
      }

      #results {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 1.5rem;
      }

      .movie-card {
        background: #1a1a1a;
        border-radius: 8px;
        overflow: hidden;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        cursor: pointer;
      }

      .movie-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 8px 24px rgba(229, 9, 20, 0.3);
      }

      .movie-card img {
        width: 100%;
        display: block;
        aspect-ratio: 2/3;
        object-fit: cover;
        background: #2a2a2a;
      }

      .movie-info {
        padding: 0.6rem 0.75rem 0.85rem;
      }

      .movie-title {
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 0.3rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .movie-rating {
        font-size: 0.82rem;
        color: #f5c518;
      }

      .movie-rating span {
        color: #aaa;
        font-size: 0.78rem;
        margin-left: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>VibeFlix</h1>
      <div class="search-bar">
        <input
          id="searchInput"
          type="text"
          placeholder="Search for movies..."
        />
        <button id="searchBtn">Search</button>
      </div>
    </header>

    <main>
      <p id="status">Search for your favourite movies above.</p>
      <div id="results"></div>
    </main>

    <script>
      const API_KEY = "YOUR_TMDB_API_KEY";
      const BASE_URL = "https://api.themoviedb.org/3";
      const IMG_URL = "https://image.tmdb.org/t/p/w342";
      const PLACEHOLDER =
        "https://via.placeholder.com/342x513/1a1a1a/888?text=No+Poster";

      const searchInput = document.getElementById("searchInput");
      const searchBtn = document.getElementById("searchBtn");
      const resultsEl = document.getElementById("results");
      const statusEl = document.getElementById("status");

      async function searchMovies(query) {
        const url = `${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("Request failed");
        const data = await res.json();
        return data.results || [];
      }

      function renderMovies(movies) {
        resultsEl.innerHTML = "";

        if (!movies.length) {
          statusEl.textContent = "No movies found. Try a different search.";
          return;
        }

        statusEl.textContent = `${movies.length} result(s) found.`;

        movies.forEach(({ title, poster_path, vote_average }) => {
          const card = document.createElement("div");
          card.className = "movie-card";

          card.innerHTML = `
          <img
            src="${poster_path ? IMG_URL + poster_path : PLACEHOLDER}"
            alt="${title}"
            loading="lazy"
          />
          <div class="movie-info">
            <div class="movie-title" title="${title}">${title}</div>
            <div class="movie-rating">
              &#9733; ${vote_average ? vote_average.toFixed(1) : "N/A"}
              <span>/ 10</span>
            </div>
          </div>
        `;

          resultsEl.appendChild(card);
        });
      }

      async function handleSearch() {
        const query = searchInput.value.trim();
        if (!query) return;

        statusEl.textContent = "Loading...";
        resultsEl.innerHTML = "";

        try {
          const movies = await searchMovies(query);
          renderMovies(movies);
        } catch (err) {
          statusEl.textContent =
            "Something went wrong. Check your API key or connection.";
          console.error(err);
        }
      }

      searchBtn.addEventListener("click", handleSearch);
      searchInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleSearch();
      });
    </script>
  </body>
</html>
